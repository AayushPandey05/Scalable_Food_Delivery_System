version: "3.8"

services:
  # 1. Your C++ User Service
  user-service:
    build: ./foodapp-backend/user-service
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=foodapp
    depends_on:
      - db

  # 2. Your Local Database (Simulating RDS)
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=foodapp
