<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome - Login & Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body>
    <div class="split-layout">
      <div class="left-pane">
        <div class="animated-bg"></div>
        <div class="content">
          <h1>Welcome to <span class="brand">Swiggy Clone</span></h1>
          <p>Your favorite food delivered hot & fresh to your door.</p>
          <div class="glass-card">
            <p>
              "The best food delivery experience I've ever had. Fast, reliable,
              and amazing UI."
            </p>
            <div class="author">- Aayush</div>
          </div>
        </div>
      </div>

      <div class="right-pane">
        <div class="auth-container">
          <div class="toggle-btns">
            <button class="toggle-btn active" id="btn-login">Login</button>
            <button class="toggle-btn" id="btn-signup">Sign Up</button>
          </div>

          <form id="auth-form" class="auth-form" onsubmit="handleAuth(event)">
            <h2 id="form-title">Welcome Back</h2>
            <p class="subtitle" id="form-subtitle">
              Please enter your details to sign in.
            </p>

            <div class="form-group slide-input hidden" id="group-name">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="Your Name" />
            </div>

            <div class="form-group slide-input">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                required
                placeholder="you@domain.com"
              />
            </div>

            <div class="form-group slide-input">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                required
                placeholder="••••••••"
              />
            </div>

            <button type="submit" class="primary-btn" id="submit-btn">
              <span class="btn-text" id="submit-text">Log In</span>
              <span class="spinner hidden"></span>
            </button>
          </form>

          <div class="divider">
            <span>or continue with</span>
          </div>

          <div class="social-login">
            <button
              onclick="loginSSO()"
              class="social-btn google-btn"
              type="button"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4"
                />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05"
                />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                />
              </svg>
              Google
            </button>

            <button
              onclick="loginSSO()"
              class="social-btn sso-btn"
              type="button"
              style="display: flex; gap: 8px; justify-content: center; align-items: center;"
            >
              Sign in with Okta/Auth0
            </button>
          </div>

          <div class="secure-footer">
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="margin-right: 4px;"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Secured by C++ Microservice & JWT HS256
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/login.js"></script>
  </body>
</html>
