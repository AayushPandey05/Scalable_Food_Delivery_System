events { 
    worker_connections 1024; 
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # 🔥 FIX: Docker's internal DNS resolver (Google/Docker standard)
        # Isse Nginx start hote waqt crash nahi hoga agar backend ready na ho
        resolver 127.0.0.11 valid=30s;

        # 1. API Gateway: Routes /api/ calls to the C++ Backend
        location ~ ^/api/(register|login|health) {
            
            # Use a variable for proxy_pass to prevent Nginx from crashing on startup
            set $backend_url http://user-service:8080;

            # --- Handle Pre-flight OPTIONS (Browser Check) ---
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # --- Proxy Settings to C++ Backend ---
            proxy_pass $backend_url; 
            
            # Prevents "Multiple values *, *" error if backend also sends CORS
            proxy_hide_header 'Access-Control-Allow-Origin'; 

            # --- CORS Headers for the actual Data requests ---
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            
            # --- Standard Proxy Headers ---
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Serves the Swiggy Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}